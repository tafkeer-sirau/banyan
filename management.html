<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="management.css" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

          <script>
        // 1. This is the pre-computed SHA-256 hash of the passcode "mySecret123"
        // Even if someone views your page source, they only see this string.
        const STORED_HASH = "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4";

        // Helper function to hash a string using native Web Crypto API
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);                    
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function authenticateUser() {
            let authenticated = false;

            while (!authenticated) {
                let userInput = prompt("Please enter the passcode:");
                
                if (userInput === null) {
                    document.write("<h1>Access Denied</h1>");
                    window.stop();
                    break;
                }

                // 2. Hash the user's input and store it in a variable
                const hashedInput = await sha256(userInput);

                // 3. Compare the two hashes
                if (hashedInput === STORED_HASH) {
                    authenticated = true;
                    // Reveal the page body once authenticated
                    document.documentElement.style.display = "block";
                } else {
                    alert("Incorrect passcode. Try again.");
                }
            }
        }

        // Hide the page content immediately before loading it
        document.documentElement.style.display = "none";
        
        // Run the authentication
        window.onload = authenticateUser;
    </script>
  </head>
