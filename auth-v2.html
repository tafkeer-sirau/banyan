<!DOCTYPE html>
<html lang="en" style="display:none">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Protected Page</title>

	<!-- <link rel="stylesheet" href="style.css"> -->

	<script>
		// SHA-256 hash of the passcode
		const STORED_HASH =
			"03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4";

		async function sha256(message) {
			const msgBuffer = new TextEncoder().encode(message);
			const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
			const hashArray = Array.from(new Uint8Array(hashBuffer));
			return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
		}

		async function authenticate() {
			// Already authenticated
			if (localStorage.getItem("confirmation") === "true") {
				document.documentElement.style.display = "";
				return;
			}

			while (true) {
				const input = prompt("Enter passcode:");

				if (input === null) {
					document.write("<h1>Access Denied</h1>");
					window.stop();
					return;
				}

				if (await sha256(input) === STORED_HASH) {
					localStorage.setItem("confirmation", "true");
					document.documentElement.style.display = "";
					return;
				}

				alert("Incorrect passcode.");
			}
		}

		document.documentElement.style.display = "none";
		window.onload = authenticate;
	</script>
</head>

<body>
	Protected Content.
</body>
</html>
