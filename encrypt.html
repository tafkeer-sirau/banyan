<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Encrypted Protected Page</title>
    <script>
        // Paste the exact base64 string you got from Step 1 here:
        const ENCRYPTED_DATA = "PASTE_YOUR_LONG_BASE64_STRING_HERE";

        async function decryptAndLoad() {
            const passcode = prompt("Enter passcode to decrypt this page:");
            if (!passcode) {
                document.write("<h1>Access Denied</h1>");
                return;
            }

            try {
                // 1. Convert Base64 string back to byte array
                const binaryStr = atob(ENCRYPTED_DATA);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++) {
                    bytes[i] = binaryStr.charCodeAt(i);
                }

                // 2. Extract the 12-byte IV and the cipher text
                const iv = bytes.slice(0, 12);
                const ciphertext = bytes.slice(12);

                // 3. Derive the exact same AES key using the user's input passcode
                const encoder = new TextEncoder();
                const pwBytes = encoder.encode(passcode);
                const pwHash = await crypto.subtle.digest('SHA-256', pwBytes);
                const key = await crypto.subtle.importKey('raw', pwHash, 'AES-GCM', false, ['decrypt']);

                // 4. Attempt Decryption
                const decryptedBuffer = await crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: iv },
                    key,
                    ciphertext
                );

                // 5. Success! Inject the raw decrypted HTML into the page
                const decryptedHtml = new TextDecoder().decode(decryptedBuffer);
                document.open();
                document.write(decryptedHtml);
                document.close();

            } catch (error) {
                // If the passcode is wrong, decryption fails natively
                alert("Incorrect passcode. Decryption failed.");
                document.write("<h1>Access Denied</h1><p>Invalid key.</p>");
            }
        }

        window.onload = decryptAndLoad;
    </script>
</head>
<body>
    </body>
</html>
